# golangci-lint v2 設定。運用決定は docs/reports/W00-planning.md W00-03 参照。
version: "2"

run:
  timeout: 5m

linters:
  # standard = errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - misspell
    - revive
  settings:
    revive:
      rules:
        # 13章1.1節: export宣言にドキュメントコメントを必須とする
        - name: exported
          disabled: false
  exclusions:
    rules:
      # internal/porttest は test 専用の stub/fake であり、interface 実装のための
      # 多数の exported メソッドに doc コメントを要求しない（13章1.1節は production path 対象）。
      - path: internal/porttest/
        linters:
          - revive
        text: 'should have comment or be unexported'

formatters:
  enable:
    - gofmt
    - goimports
